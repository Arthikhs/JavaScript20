<!DOCTYPE html>
<html>
<head>
  <style>
    .hidden { display: none; }
  </style>
</head>
<body>
<div id="testDiv">
    Hello <span class="hidden">Invisible</span> 
    <b>World</b>
  </div>

  <button onclick="showInnerText()">Show innerText</button>
  <button onclick="showTextContent()">Show textContent</button>
  <button onclick="showInnerHTML()">Show innerHTML</button>

  <div id="output">Result will appear here...</div>

  <script>
    const div = document.getElementById("testDiv");
    const output = document.getElementById("output");

    function showInnerText() {
      output.textContent = "innerText → " + div.innerText;
    }

    function showTextContent() {
      output.textContent = "textContent → " + div.textContent;
    }

    function showInnerHTML() {
      output.textContent = "innerHTML → " + div.innerHTML;
    }
  </script>
</body>
</html>
